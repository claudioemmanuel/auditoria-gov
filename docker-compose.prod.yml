# docker-compose.prod.yml — production overrides for the public layer
# Frontend served by Vercel — web service disabled.
# Postgres and Redis managed by openwatch-core on the same host.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  api:
    restart: unless-stopped
    environment:
      APP_ENV: production

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
        reservations:
          memory: 32M
    networks:
      - openwatch-net

  web:
    profiles:
      - disabled

volumes:
  caddy_data:
  caddy_config:

networks:
  openwatch-net:
    external: true
    name: openwatch-net
