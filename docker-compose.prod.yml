# Production overrides — applies on top of docker-compose.yml.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  api:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 512M
        reservations:
          memory: 192M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
        reservations:
          memory: 32M
    networks:
      - openwatch-net

volumes:
  caddy_data:
  caddy_config:
