# docker-compose.prod.yml — production overrides for the public layer.
# Frontend served by Vercel — web service disabled.
# Workers and analytics run from openwatch-core on the same host or a separate service.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Shortcut — add to .env on your server:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml

services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  api:
    restart: unless-stopped
    environment:
      APP_ENV: production

  # Caddy handles TLS termination for the public API.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
        reservations:
          memory: 32M

  # Frontend deployed to Vercel — web container not needed in production.
  web:
    profiles:
      - disabled

volumes:
  caddy_data:
  caddy_config:
