# openwatch — public API gateway
#
# Requires openwatch-core to be running first (it creates openwatch-net):
#   cd ../openwatch-core && make dev
#
# Then start this repo:
#   make dev

services:

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: runtime
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env.runtime
    environment:
      PYTHONPATH: /app
      APP_ENV: development
      # Connects to openwatch-core internal API via openwatch-net.
      # On macOS with split stacks, set CORE_SERVICE_URL=http://host.docker.internal:8001
      # in .env.runtime (generated automatically by openwatch-core's make env).
      CORE_SERVICE_URL: ${CORE_SERVICE_URL:-http://core-api:8001}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - openwatch-net

networks:
  openwatch-net:
    external: true
    name: openwatch-net
