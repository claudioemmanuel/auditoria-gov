# openwatch — public API gateway + frontend
#
# Requires openwatch-core to be running first (postgres, redis, core-api on openwatch-net).
#
# Setup:
#   # 1. Start openwatch-core first:
#   #    cd ../openwatch-core && make dev
#   #
#   # 2. Then start this repo:
#   cp .env.example .env   # set CORE_SERVICE_URL=http://core-api:8001
#   make dev               # docker compose up -d

services:

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: runtime
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      PYTHONPATH: /app
      APP_ENV: development
      # Reaches openwatch-core internal API via the shared Docker network
      # Allow overriding via environment (e.g. .env.runtime) for local development.
      CORE_SERVICE_URL: ${CORE_SERVICE_URL:-http://core-api:8001}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 512M
        reservations:
          memory: 192M
    networks:
      - openwatch-net

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: builder
    command: npm run dev
    environment:
      NODE_ENV: development
      NODE_OPTIONS: "--max-old-space-size=1024"
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          memory: 512M
    networks:
      - openwatch-net

networks:
  openwatch-net:
    external: true
    name: openwatch-net
