services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: on-failure
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auditoria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auditoria}
      POSTGRES_DB: ${POSTGRES_DB:-auditoria}
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=top
      -c shared_buffers=384MB
      -c work_mem=8MB
      -c max_connections=30
      -c effective_cache_size=768MB
      -c maintenance_work_mem=256MB
      -c checkpoint_completion_target=0.9
      -c checkpoint_timeout=15min
      -c wal_buffers=16MB
      -c synchronous_commit=on
      -c bgwriter_lru_maxpages=100
      -c bgwriter_delay=100
      -c max_wal_size=1GB
      -c min_wal_size=128MB
      -c pg_stat_statements.max=500
      -c track_activity_query_size=1024
      -c log_rotation_age=1d
      -c log_rotation_size=50MB
      -c log_min_duration_statement=10000
      -c log_statement=none
      -c log_destination=stderr
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1536M
        reservations:
          memory: 512M
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auditoria}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 192mb --maxmemory-policy allkeys-lru ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 384M
        reservations:
          memory: 128M
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./shared:/app/shared
      - ./api:/app/api
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 384M
        reservations:
          memory: 192M

  # Primary worker: I/O-bound tasks (ingest, normalize, ai, maintenance) + Beat scheduler.
  # Beat is embedded here (--beat flag) to avoid a separate container.
  # Only ONE worker-primary should ever run — duplicate beat schedulers cause double-firing.
  # Concurrency=6: ingest tasks are network-bound; high concurrency is safe.
  worker-primary:
    restart: on-failure
    user: "openwatch"
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: celery -A worker.worker_app worker --beat --loglevel=info -Q ingest,normalize,ai,default,vacuum --concurrency=6 --max-memory-per-child=262144 -n worker-primary@%h
    env_file: .env
    environment:
      PYTHONPATH: /app
      APP_ENV: production
      LOG_FORMAT: json
      SQL_ECHO: "false"
      MEM_WARN_PCT: "75"
      MEM_BLOCK_PCT: "85"
      CPU_WARN_PCT: "85"
      BACKLOG_WARN_ETA_MINUTES: "30"
      INFRA_ALERT_WEBHOOK_URL: ""
      INFRA_ALERT_COOLDOWN_SECONDS: "1800"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./worker:/app/worker
      - /etc/localtime:/etc/localtime:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          memory: 512M

  # Heavy worker: CPU/IO-bound tasks (ER, signals, bulk ingestion).
  # Handles long-running resource-intensive work separately so it cannot starve primary queues.
  # Concurrency=1: these tasks are memory-heavy; serial execution prevents OOM.
  worker-heavy:
    restart: on-failure
    user: "openwatch"
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: celery -A worker.worker_app worker --loglevel=info -Q er,signals,bulk,default --concurrency=1 --max-memory-per-child=1024000 -n worker-heavy@%h
    env_file: .env
    environment:
      PYTHONPATH: /app
      APP_ENV: production
      LOG_FORMAT: json
      SQL_ECHO: "false"
      MEM_WARN_PCT: "75"
      MEM_BLOCK_PCT: "85"
      CPU_WARN_PCT: "85"
      BACKLOG_WARN_ETA_MINUTES: "30"
      INFRA_ALERT_WEBHOOK_URL: ""
      INFRA_ALERT_COOLDOWN_SECONDS: "1800"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./worker:/app/worker
      - /etc/localtime:/etc/localtime:ro
      - tse_data:/data/tse
      - receita_data:/data/receita_cnpj
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
        reservations:
          memory: 512M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
        reservations:
          memory: 32M

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: builder
    command: npm run dev
    environment:
      NODE_ENV: development
      NODE_OPTIONS: "--max-old-space-size=1024"
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    depends_on:
      - api
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          memory: 512M

volumes:
  pgdata:
  redis_data:
  tse_data:
  receita_data:
  caddy_data:
  caddy_config:
