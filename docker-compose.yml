# docker-compose.yml
# Public-layer stack: postgres + redis + public API gateway.
#
# Workers and analytics pipelines live in the private openwatch-core repository.
# For a full local development setup, also run openwatch-core's docker compose
# and set CORE_SERVICE_URL=http://localhost:8001 in your .env file.
#
# Usage:
#   cp .env.example .env   # fill in your values
#   docker compose up -d
#   docker compose logs -f api

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: on-failure
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auditoria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auditoria}
      POSTGRES_DB: ${POSTGRES_DB:-auditoria}
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=top
      -c shared_buffers=384MB
      -c work_mem=8MB
      -c max_connections=30
      -c effective_cache_size=768MB
      -c maintenance_work_mem=256MB
      -c checkpoint_completion_target=0.9
      -c checkpoint_timeout=15min
      -c wal_buffers=16MB
      -c synchronous_commit=on
      -c bgwriter_lru_maxpages=100
      -c bgwriter_delay=100
      -c max_wal_size=1GB
      -c min_wal_size=128MB
      -c pg_stat_statements.max=500
      -c track_activity_query_size=1024
      -c log_rotation_age=1d
      -c log_rotation_size=50MB
      -c log_min_duration_statement=10000
      -c log_statement=none
      -c log_destination=stderr
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1536M
        reservations:
          memory: 512M
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auditoria}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 192mb --maxmemory-policy allkeys-lru ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 384M
        reservations:
          memory: 128M
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 512M
        reservations:
          memory: 192M

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: builder
    command: npm run dev
    environment:
      NODE_ENV: development
      NODE_OPTIONS: "--max-old-space-size=1024"
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          memory: 512M

volumes:
  pgdata:
  redis_data:
