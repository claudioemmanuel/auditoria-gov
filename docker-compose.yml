services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auditoria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auditoria}
      POSTGRES_DB: ${POSTGRES_DB:-auditoria}
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auditoria}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./shared:/app/shared
      - ./api:/app/api

  # I/O-bound worker: external API fetches + normalization.
  # Concurrency tuned for network-wait tasks (gevent or higher prefork concurrency).
  worker-io:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: celery -A worker.worker_app worker --loglevel=info -Q ingest,normalize --concurrency=4 -n worker-io@%h
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./worker:/app/worker

  # CPU-bound worker: ER matching, signal detection, baselines, coverage.
  worker-cpu:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: celery -A worker.worker_app worker --loglevel=info -Q er,signals,default --concurrency=2 -n worker-cpu@%h
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./worker:/app/worker

  # AI worker: LLM calls (low concurrency to respect API rate limits).
  worker-ai:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: celery -A worker.worker_app worker --loglevel=info -Q ai --concurrency=1 -n worker-ai@%h
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./worker:/app/worker

  beat:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: celery -A worker.worker_app beat --loglevel=info
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./worker:/app/worker

  # Celery monitoring dashboard: queue backlog, task latency, worker status.
  flower:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: celery -A worker.worker_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./worker:/app/worker

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public

volumes:
  pgdata:
