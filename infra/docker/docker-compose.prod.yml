# Production override — OCI Always Free (4 ARM cores, 24GB RAM)
# Frontend served by Vercel — web service disabled.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Shortcut — add to .env on your server:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml

services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  api:
    restart: unless-stopped
    environment:
      APP_ENV: production

  worker-ingest:
    restart: unless-stopped

  worker-normalize:
    restart: unless-stopped

  worker-bulk:
    restart: unless-stopped

  worker-cpu:
    restart: unless-stopped

  worker-ai:
    restart: unless-stopped

  beat:
    restart: unless-stopped

  flower:
    restart: unless-stopped

  caddy:
    restart: unless-stopped
    environment:
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN must be set in .env (e.g. api.yourdomain.com)}

  # Frontend deployed to Vercel — web container not needed in production
  web:
    profiles:
      - disabled
