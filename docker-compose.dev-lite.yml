# docker-compose.dev-lite.yml
# Lightweight override for local development (~2.8 GB total instead of ~7.5 GB).
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev-lite.yml up -d
# Run web natively: cd web && NEXT_PUBLIC_API_URL=http://localhost:8000 npm run dev

services:
  postgres:
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=top
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c max_connections=20
      -c effective_cache_size=256MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c checkpoint_timeout=15min
      -c wal_buffers=8MB
      -c synchronous_commit=on
      -c max_wal_size=512MB
      -c min_wal_size=64MB
      -c pg_stat_statements.max=200
      -c track_activity_query_size=512
      -c log_min_duration_statement=30000
      -c log_statement=none
      -c log_destination=stderr
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 768M
        reservations:
          memory: 256M

  redis:
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 256M
        reservations:
          memory: 64M

  api:
    environment:
      APP_ENV: development
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 384M
        reservations:
          memory: 128M

  # Merge both workers into a single container.
  # Memory budget: 2 workers × 300MB + main/beat overhead ≈ 900MB → 1536M limit.
  worker-primary:
    user: "openwatch"
    command: celery -A worker.worker_app worker --beat --loglevel=info -Q ingest,normalize,ai,default,vacuum,er,signals,bulk --concurrency=2 --max-memory-per-child=300000 -n worker-unified@%h
    environment:
      APP_ENV: development
      LOG_FORMAT: json
      SQL_ECHO: "false"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1536M
        reservations:
          memory: 256M

  # Disable worker-heavy (merged into worker-primary above)
  worker-heavy:
    profiles: ["disabled"]

  # Disable caddy (access API directly on :8000)
  caddy:
    profiles: ["disabled"]

  # Disable web (run natively: cd web && npm run dev)
  web:
    profiles: ["disabled"]
