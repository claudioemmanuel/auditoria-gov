# docker-compose.dev-lite.yml — lower resource limits for local dev machines
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev-lite.yml up -d

services:
  api:
    environment:
      APP_ENV: development
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 384M
        reservations:
          memory: 128M

  # Disable web container — run natively instead:
  #   cd apps/web && NEXT_PUBLIC_API_URL=http://localhost:8000 npm run dev
  web:
    profiles: ["disabled"]
