# docker-compose.dev-lite.yml — resource overrides for local dev (Apple M4, 8 GB Docker VM)
#
# Web runs natively — NOT in Docker — to save ~1 GB of container RAM:
#   cd apps/web && NEXT_PUBLIC_API_URL=http://localhost:8000 npm run dev
#
# Usage:
#   make dev-lite

services:
  api:
    environment:
      APP_ENV: development
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 96M

  # Web is intentionally excluded from local dev — run it natively instead.
  web:
    profiles: ["disabled"]
