[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openwatch-connectors"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "openwatch-models",
    "openwatch-config",
    "openwatch-utils",
    "httpx>=0.28",
]

[tool.hatch.build.targets.wheel]
packages = ["openwatch_connectors"]
