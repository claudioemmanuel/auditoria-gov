[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openwatch-db"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "openwatch-models",
    "openwatch-config",
    "asyncpg>=0.30",
    "psycopg[binary]>=3.2",
    "sqlalchemy[asyncio]>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["openwatch_db"]

[tool.uv.sources]
    openwatch-config = { workspace = true }
    openwatch-models = { workspace = true }
