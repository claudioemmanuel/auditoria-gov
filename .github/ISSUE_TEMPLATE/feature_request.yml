name: Feature Request
description: Propose a new feature or enhancement
title: "[feat] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Pipeline reminder:** Issues must be approved before work starts.
        No branch or PR without a triaged issue in "Ready for Analysis".
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? Who is affected?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature clearly.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which public layer is this in?
      options:
        - Frontend (web/)
        - SDK (packages/sdk/)
        - Public API (api/public)
        - Connector (public connector)
        - Documentation
        - DevTooling / CI
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
