name: Refactor
description: Code quality improvement or technical debt reduction
title: "[refactor] "
labels: ["refactor", "needs-triage"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this refactor needed?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which files/modules are affected?
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks
      description: What could break?
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight
      options:
        - label: Tests exist for affected code
          required: true
        - label: No behavior change intended
