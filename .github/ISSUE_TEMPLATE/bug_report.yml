name: Bug Report
description: Report a bug in OpenWatch
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        **No work will begin without this issue being triaged and moved to "Ready for Analysis".**
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run ...
        2. Call endpoint ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (data loss / security)
        - High (feature broken)
        - Medium (degraded behavior)
        - Low (cosmetic)
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Branch/commit, Docker version, OS"
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      render: shell
