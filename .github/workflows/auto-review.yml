name: Auto-request Copilot review

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

jobs:
  request-copilot-review:
    name: Request Copilot code review
    runs-on: ubuntu-latest
    # Skip draft PRs and skip if already reviewed
    if: github.event.pull_request.draft == false
    permissions:
      pull-requests: write
    steps:
      - name: Request review from Copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" \
            --add-reviewer "copilot-swe-agent[bot]" 2>/dev/null || \
          gh pr comment "$PR_NUMBER" --repo "$REPO" \
            --body "@copilot review" || true
