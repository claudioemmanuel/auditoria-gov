name: Stale Issues and PRs

on:
  schedule:
    # Run daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # ── Issues ────────────────────────────────────────────────────────────
          stale-issue-message: |
            This issue has been inactive for 30 days and will be closed in 7 days
            unless there is new activity.

            If this is still relevant, please:
            - Add a comment with current status
            - Remove the `stale` label

          close-issue-message: |
            This issue has been closed due to inactivity.
            It can be reopened if the issue is still valid.

          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: stale
          exempt-issue-labels: "pinned,security,in-progress,blocked"

          # ── PRs ───────────────────────────────────────────────────────────────
          stale-pr-message: |
            This PR has been inactive for 14 days and will be closed in 7 days
            unless there is new activity.

            Please rebase, address any review comments, or close the PR if no
            longer needed.

          close-pr-message: |
            This PR has been closed due to inactivity. The branch will be cleaned up.
            Please reopen if you'd like to continue.

          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: stale
          exempt-pr-labels: "pinned,do-not-merge,security"
