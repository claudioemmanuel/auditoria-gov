name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Public packages + API (no core required) ─────────────────────────────────
  python-public:
    name: Python — Public Packages & API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Install all workspace deps
        run: uv sync --all-packages --all-extras
      - name: Auto-fix lint
        run: uv run ruff check --fix packages/ api/ shared/ || true
      - name: Lint (fail on unfixable errors only)
        run: uv run ruff check packages/ api/ shared/
      - name: Check import boundaries
        run: uv run lint-imports --config .import-linter
      - name: Run public tests
        run: uv run pytest tests/public/api tests/public/utils -q
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          DATABASE_URL_SYNC: postgresql+psycopg://test:test@localhost:5432/test
          CPF_HASH_SALT: test-salt-for-ci
          INTERNAL_API_KEY: test-internal-key
          APP_ENV: development

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.auditoria.example.com
